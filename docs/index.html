<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>GitHub Token Test</title>
  <style>
    body {
      font-family: sans-serif;
      max-width: 720px;
      margin: 24px auto;
      padding: 0 16px;
    }
    button {
      font-size: 16px;
      padding: 12px 16px;
      cursor: pointer;
    }
    pre {
      white-space: pre-wrap;
      background: #f5f5f5;
      padding: 12px;
      margin-top: 16px;
      border: 1px solid #ddd;
    }
  </style>
</head>
<body>
  <h1>GitHub Token Test</h1>
  <button id="testBtn">APIテスト</button>
  <pre id="result">未実行</pre>

  <script>
    const OWNER = "fumin1990jk-creator";
    const REPO = "image_share";
    const TOKEN = "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";

    const result = document.getElementById('result');
    const btn = document.getElementById('testBtn');

    btn.addEventListener('click', async () => {
      result.textContent = '通信中...';

      try {
        const url = `https://api.github.com/repos/${OWNER}/${REPO}`;
        const res = await fetch(url, {
          headers: {
            'Authorization': `Bearer ${TOKEN}`,
            'Accept': 'application/vnd.github+json'
          }
        });

        const text = await res.text();
        result.textContent =
          `status: ${res.status}\n\n` +
          text;
      } catch (err) {
        result.textContent = `エラー: ${err.message}`;
      }
    });
  </script>
</body>
</html>
